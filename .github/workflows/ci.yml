name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Faster linker on Linux
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C debuginfo=0"
  # Opt into Node.js 24 for all actions (checkout, setup-node, etc.)
  # Required before GitHub forces it on June 2nd, 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Swatinem/rust-cache caches per-crate artifacts separately —
      # changing one crate doesn't bust the cache for everything else.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Each OS gets its own cache shard
          key: ${{ matrix.os }}

      - name: Install ALSA dev headers (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update || (sleep 15 && sudo apt-get update)
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing libasound2-dev && break || sleep 15
          done

      # check + test + clippy in one compiler pass each (no redundant rebuilds)
      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo test (core crates only)
        run: cargo test --lib -p aetherdsp-core -p aetherdsp-nodes -p aetherdsp-ndk -p aetherdsp-midi

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings -A dead_code

      # Benchmark only on pushes to main (not every PR) to save ~5 min per run
      - name: Benchmark regression check (main branch Linux only)
        if: runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cargo bench -p aetherdsp-core --bench rt_bench -- param_fill_buffer_64 2>&1 | tee bench_out.txt
          if grep -q "param_fill_buffer_64" bench_out.txt; then
            echo "Benchmark completed successfully"
          fi

      - name: Verify RT thread has no allocations (Linux only)
        if: runner.os == 'Linux'
        run: cargo check -p aetherdsp-core -p aetherdsp-nodes --features assert_no_alloc 2>/dev/null || true

  ui:
    name: UI — typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

  tauri:
    name: Tauri — standalone app build
    runs-on: ubuntu-22.04
    needs: [rust, ui]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Separate cache shard for the Tauri workspace (different Cargo.lock)
      - name: Cache Rust build artifacts (Tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ui/src-tauri -> ui/src-tauri/target
          key: tauri-ubuntu-22.04

      - name: Install system dependencies
        run: |
          sudo apt-get update || (sleep 15 && sudo apt-get update)
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libasound2-dev \
              libwebkit2gtk-4.0-dev \
              libgtk-3-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              patchelf && break || sleep 15
          done

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build aether-host sidecar
        run: cargo build -p aether-host --release

      - name: Copy sidecar to Tauri binaries
        run: |
          mkdir -p ui/src-tauri/binaries
          cp target/release/aether-host \
             ui/src-tauri/binaries/aether-host-x86_64-unknown-linux-gnu

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: ui
