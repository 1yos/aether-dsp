name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install ALSA dev headers (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libasound2-dev

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo test (core crates only)
        run: cargo test --lib -p aetherdsp-core -p aetherdsp-nodes -p aetherdsp-ndk -p aetherdsp-midi

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings -A dead_code

      - name: Verify RT thread has no allocations (debug build check)
        if: runner.os == 'Linux'
        run: |
          cargo check -p aetherdsp-core -p aetherdsp-nodes --features assert_no_alloc 2>/dev/null || true

  ui:
    name: UI — typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui
