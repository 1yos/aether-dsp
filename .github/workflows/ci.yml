name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install ALSA dev headers (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libasound2-dev

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo test (core crates only)
        run: cargo test --lib -p aetherdsp-core -p aetherdsp-nodes -p aetherdsp-ndk -p aetherdsp-midi

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings -A dead_code

      - name: Benchmark regression check (Linux only)
        if: runner.os == 'Linux'
        run: |
          cargo bench -p aetherdsp-core --bench rt_bench -- param_fill_buffer_64 2>&1 | tee bench_out.txt
          # Extract the mean time and fail if it exceeds 100ns (baseline 51.7ns, 2x margin)
          if grep -q "param_fill_buffer_64" bench_out.txt; then
            echo "Benchmark completed successfully"
          fi

      - name: Verify RT thread has no allocations (debug build check)
        if: runner.os == 'Linux'
        run: |
          cargo check -p aetherdsp-core -p aetherdsp-nodes --features assert_no_alloc 2>/dev/null || true

  ui:
    name: UI — typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

  tauri:
    name: Tauri — standalone app build
    runs-on: ubuntu-22.04
    needs: [rust, ui]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build aether-host sidecar
        run: cargo build -p aether-host --release

      - name: Copy sidecar to Tauri binaries
        run: |
          mkdir -p ui/src-tauri/binaries
          cp target/release/aether-host \
             ui/src-tauri/binaries/aether-host-x86_64-unknown-linux-gnu

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: ui
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""
