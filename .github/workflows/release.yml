name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C debuginfo=0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build artifacts for all three platforms ──────────────────────────────────
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux
            bundle_path: ui/src-tauri/target/release/bundle
          - os: macos-latest
            artifact_name: macos
            bundle_path: ui/src-tauri/target/release/bundle
          - os: windows-latest
            artifact_name: windows
            bundle_path: ui/src-tauri/target/release/bundle

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ui/src-tauri -> ui/src-tauri/target
          key: release-${{ matrix.os }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update || (sleep 15 && sudo apt-get update)
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libasound2-dev \
              libwebkit2gtk-4.0-dev \
              libgtk-3-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              patchelf && break || sleep 15
          done

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build aether-host sidecar (Linux/macOS)
        if: runner.os != 'Windows'
        run: cargo build -p aether-host --release

      - name: Build aether-host sidecar (Windows)
        if: runner.os == 'Windows'
        run: cargo build -p aether-host --release
        env:
          PATH: "C:\\msys64\\mingw64\\bin;${{ env.PATH }}"

      - name: Copy sidecar — Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p ui/src-tauri/binaries
          cp target/release/aether-host \
             ui/src-tauri/binaries/aether-host-x86_64-unknown-linux-gnu

      - name: Copy sidecar — macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p ui/src-tauri/binaries
          cp target/release/aether-host \
             ui/src-tauri/binaries/aether-host-aarch64-apple-darwin || \
          cp target/release/aether-host \
             ui/src-tauri/binaries/aether-host-x86_64-apple-darwin

      - name: Copy sidecar — Windows
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path ui/src-tauri/binaries
          Copy-Item target/release/aether-host.exe `
            ui/src-tauri/binaries/aether-host-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: ui
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Linux bundles
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: aether-studio-linux
          path: |
            ui/src-tauri/target/release/bundle/deb/*.deb
            ui/src-tauri/target/release/bundle/rpm/*.rpm
            ui/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS bundles
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: aether-studio-macos
          path: |
            ui/src-tauri/target/release/bundle/dmg/*.dmg
            ui/src-tauri/target/release/bundle/macos/*.app.tar.gz

      - name: Upload Windows bundles
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: aether-studio-windows
          path: |
            ui/src-tauri/target/release/bundle/msi/*.msi
            ui/src-tauri/target/release/bundle/nsis/*.exe

  # ── Create GitHub Release and attach all artifacts ───────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Extract changelog section for this version from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${{ steps.version.outputs.version }}\]/,/^## \[/" CHANGELOG.md \
              | head -n -1 > release_notes.md
          else
            echo "Aether Studio v${{ steps.version.outputs.version }}" > release_notes.md
            echo "" >> release_notes.md
            echo "See [README](README.md) for full feature list." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aether Studio v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/aether-studio-linux/**
            dist/aether-studio-macos/**
            dist/aether-studio-windows/**
